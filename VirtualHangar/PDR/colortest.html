    <script>
      // ------------------------------
      // Color-based highlighting system
      // Hover -> cyan ; Click/select -> yellow
      // No bboxDisplay changes anywhere (no bounding boxes)
      // ------------------------------

      const PART_DEFS = [
        'Fuselage',
        'Canopy',
        'HorStab',
        'VTail',
        'Wing',
        'Inlet',
        'Box'
      ];

      // Info object matching your original descriptions (shortened where repeated)
      const INFO = {
        Fuselage: {
          title: 'Plane Fuselage',
          text:
            "stores fuel and stuff",
        },
        Canopy: {
          title: 'Canopy',
          text:
            "super awesome pilot man",
        },
        HorStab: {
          title: 'Horizontal Stabilators',
          text:
            "supermaneuverability go brrrrrr",
        },
        VTail: {
          title: 'V-Tail',
          text:
            "V-tail so we aren't the size of New York on radar",
        },
        Wing: {
          title: 'Wings',
          text:
            'Red Bull gives you wiiiiiiiiiiiiings',
        },
        Inlet: {
          title: 'Engine Inlets',
          text:
            'feed air to the Very Hungry Catipillar of our 2 F-110 engines',
        },
        Box: {
          title: 'box',
          text:
          'box box box',
        }
      }; 

      const initialText =
            "hi we are Roy and Sons and we da best";

      const Colors = { hover: '1 0 1', select: '0  1  0' };

      // Stores the currently selected Transform (if any)
      let currentSelection = null;
      // Stores baseline material attributes per Transform to restore later
      const baselineByPart = new Map();
      // Stores override Material nodes added per Transform so they can be removed
      const overrideByPart = new Map();
      // WeakMap to store per-element baseline attributes (diffuseColor, emissiveColor, etc.)
      const elementBaseline = new WeakMap();
      // (we no longer override textures with a white pixel)
      // Tracks which parts are currently hidden
      const hiddenParts = new Set();

      // Helpers to find material nodes under a Transform
      function getMaterials(part) {
        // X3D can have different material tag names; handle both
        const phys = Array.from(part.getElementsByTagName('PhysicalMaterial'));
        const classic = Array.from(part.getElementsByTagName('Material'));
        // Debug: report what we found (helpful when Inlines load asynchronously)
        try { console.log('getMaterials for', part.getAttribute && part.getAttribute('DEF'), 'PhysicalMaterial:', phys.length, 'Material:', classic.length); } catch (e) { /* ignore */ }
        return { phys, classic };
      }

      // Capture baseline attribute values per element (use WeakMap for safety)
      function captureBaseline(part) {
        const mats = getMaterials(part);
        const elements = [];
        try {
          mats.phys.forEach(el => {
            if (!elementBaseline.has(el)) {
              const baseline = {
                diffuseColor: el.getAttribute('diffuseColor'),
                hadDiffuseColor: el.hasAttribute('diffuseColor'),
                diffuseFactor: el.getAttribute('diffuseFactor'),
                hadDiffuseFactor: el.hasAttribute('diffuseFactor'),
                emissiveColor: el.getAttribute('emissiveColor'),
                hadEmissiveColor: el.hasAttribute('emissiveColor'),
                emissiveFactor: el.getAttribute('emissiveFactor'),
                hadEmissiveFactor: el.hasAttribute('emissiveFactor'),
                roughness: el.getAttribute('roughnessValue') || el.getAttribute('roughness'),
                hadRoughness: el.hasAttribute('roughnessValue') || el.hasAttribute('roughness'),
                metallic: el.getAttribute('metallicValue') || el.getAttribute('metallic'),
                hadMetallic: el.hasAttribute('metallicValue') || el.hasAttribute('metallic'),
                transparency: el.getAttribute('transparency'),
                hadTransparency: el.hasAttribute('transparency')
              };
              elementBaseline.set(el, baseline);
              try { console.log('captured PhysicalMaterial baseline:', baseline); } catch (e) { }
            }
            elements.push(el);
          });
          mats.classic.forEach(el => {
            if (!elementBaseline.has(el)) {
              const baseline = {
                diffuseColor: el.getAttribute('diffuseColor'),
                hadDiffuseColor: el.hasAttribute('diffuseColor'),
                emissiveColor: el.getAttribute('emissiveColor'),
                hadEmissiveColor: el.hasAttribute('emissiveColor'),
                transparency: el.getAttribute('transparency'),
                hadTransparency: el.hasAttribute('transparency'),
                shininess: el.getAttribute('shininess'),
                hadShininess: el.hasAttribute('shininess')
              };
              elementBaseline.set(el, baseline);
              try { console.log('captured classic Material baseline:', baseline); } catch (e) { }
            }
            elements.push(el);
          });
        } catch (e) { /* ignore */ }
        baselineByPart.set(part, elements);
        try { console.log('captureBaseline', part.getAttribute && part.getAttribute('DEF'), 'elements:', elements.length); } catch (e) { }
      }

      // We no longer replace ImageTexture URLs with a white pixel. Instead
      // we rely on setting emissive/diffuse attributes on materials so the
      // highlight shows through textured materials when possible.

      // Add a classic Material under each Shape->Appearance to force visible tint
      function addOverrideMaterials(part, color) {
        try {
          // don't add overrides if we've already added them
          if (overrideByPart.has(part) && overrideByPart.get(part).materials) return;
          const shapes = Array.from(part.getElementsByTagName('Shape'));
          const created = [];
          for (const s of shapes) {
            let app = s.getElementsByTagName('Appearance')[0];
            if (!app) {
              app = document.createElement('Appearance');
              s.appendChild(app);
            }
            const mat = document.createElement('Material');
            mat.setAttribute('diffuseColor', color);
            // emissive helps make tint obvious even under PBR textures
            mat.setAttribute('emissiveColor', color);
            mat.setAttribute('data-generated', 'true');
            app.appendChild(mat);
            created.push(mat);
          }
          if (created.length) {
            const data = overrideByPart.get(part) || {};
            data.materials = created;
            overrideByPart.set(part, data);
          }
          console.log('addOverrideMaterials for', part.getAttribute && part.getAttribute('DEF'), 'created:', created.length);
        } catch (e) { console.log('addOverrideMaterials error', e); }
      }

      // Apply color to all material nodes under the part
      // Sets all material properties to neutral so the highlight is consistent
      function setPartColor(part, color) {
        const mats = getMaterials(part);
        try { console.log('setPartColor', part.getAttribute && part.getAttribute('DEF'), 'color:', color, mats); } catch (e) { /* ignore */ }
        for (const el of mats.phys) {
          try { el.setAttribute('diffuseColor', '0.2 0.2 0.2'); } catch (e) { /* ignore */ }
          try { el.setAttribute('diffuseFactor', '0.1'); } catch (e) { /* ignore */ }
          // Use emissive with HIGH factor to dominate the appearance
          try { 
            el.setAttribute('emissiveColor', color); 
            console.log('set emissiveColor to:', color); 
          } catch (e) { /* ignore */ }
          try { el.setAttribute('emissiveFactor', '10'); } catch (e) { /* ignore */ }
        }
        for (const el of mats.classic) {
          try { el.setAttribute('diffuseColor', '0.2 0.2 0.2'); } catch (e) { /* ignore */ }
          try { el.setAttribute('emissiveColor', color); } catch (e) { /* ignore */ }
        }
      }

      // Restore saved baseline attributes per element. Also remove generated
      // override Materials and restore any texture URLs that we replaced.
      function restorePartFromBaseline(part) {
        const elements = baselineByPart.get(part) || [];
        try { console.log('restorePartFromBaseline', part.getAttribute && part.getAttribute('DEF'), 'elements:', elements.length); } catch (e) { }
        try {
          for (const el of elements) {
            try {
              const saved = elementBaseline.get(el);
              if (!saved) continue;
              if ('hadDiffuseColor' in saved) {
                if (saved.hadDiffuseColor) {
                  if (saved.diffuseColor === null || saved.diffuseColor === undefined) el.setAttribute('diffuseColor', '');
                  else el.setAttribute('diffuseColor', saved.diffuseColor);
                } else {
                  el.removeAttribute('diffuseColor');
                }
              }
              if ('hadDiffuseFactor' in saved) {
                if (saved.hadDiffuseFactor) {
                  if (saved.diffuseFactor === null || saved.diffuseFactor === undefined) el.setAttribute('diffuseFactor', '');
                  else el.setAttribute('diffuseFactor', saved.diffuseFactor);
                } else {
                  el.removeAttribute('diffuseFactor');
                }
              }
              if ('hadEmissiveColor' in saved) {
                if (saved.hadEmissiveColor) {
                  if (saved.emissiveColor === null || saved.emissiveColor === undefined) el.setAttribute('emissiveColor', '');
                  else el.setAttribute('emissiveColor', saved.emissiveColor);
                } else {
                  el.removeAttribute('emissiveColor');
                }
              }
              if ('hadEmissiveFactor' in saved) {
                if (saved.hadEmissiveFactor) {
                  if (saved.emissiveFactor === null || saved.emissiveFactor === undefined) el.setAttribute('emissiveFactor', '');
                  else el.setAttribute('emissiveFactor', saved.emissiveFactor);
                } else {
                  el.removeAttribute('emissiveFactor');
                }
              }
              // Restore roughness/metallic for PhysicalMaterial
              if ('hadRoughness' in saved) {
                if (saved.hadRoughness) {
                  const attr = el.hasAttribute('roughnessValue') ? 'roughnessValue' : 'roughness';
                  if (saved.roughness === null || saved.roughness === undefined) el.setAttribute(attr, '');
                  else el.setAttribute(attr, saved.roughness);
                } else {
                  el.removeAttribute('roughnessValue');
                  el.removeAttribute('roughness');
                }
              }
              if ('hadMetallic' in saved) {
                if (saved.hadMetallic) {
                  const attr = el.hasAttribute('metallicValue') ? 'metallicValue' : 'metallic';
                  if (saved.metallic === null || saved.metallic === undefined) el.setAttribute(attr, '');
                  else el.setAttribute(attr, saved.metallic);
                } else {
                  el.removeAttribute('metallicValue');
                  el.removeAttribute('metallic');
                }
              }
              if ('hadTransparency' in saved) {
                if (saved.hadTransparency) {
                  if (saved.transparency === null || saved.transparency === undefined) el.setAttribute('transparency', '');
                  else el.setAttribute('transparency', saved.transparency);
                } else {
                  el.removeAttribute('transparency');
                }
              }
              // Restore shininess for classic Material
              if ('hadShininess' in saved) {
                if (saved.hadShininess) {
                  if (saved.shininess === null || saved.shininess === undefined) el.setAttribute('shininess', '');
                  else el.setAttribute('shininess', saved.shininess);
                } else {
                  el.removeAttribute('shininess');
                }
              }
            } catch (e) { /* ignore per-element */ }
          }
        } catch (e) { /* ignore */ }
        // remove any override materials we added and restore textures
        try {
          const data = overrideByPart.get(part) || {};
          const created = data.materials || [];
          for (const n of created) {
            if (n && n.parentNode) n.parentNode.removeChild(n);
          }
          try { console.log('restorePartFromBaseline removed', created.length, 'override materials'); } catch (e) { }
          overrideByPart.delete(part);
        } catch (e) { }
        // We do not replace Inline nodes (that causes x3dom to reload the GLB).
        // Restoring attributes and removing override Materials is sufficient.
      }

      // Select a part by DEF (only valid parts). Do NOT use for 'initial'.
      function selectPartByDEF(partDEF) {
        // Only allow selection for known parts
        if (!PART_DEFS.includes(partDEF)) return;

        // Restore previous selection (if any)
        if (currentSelection && currentSelection !== null) {
          try { restorePartFromBaseline(currentSelection); } catch (e) { /* ignore */ }
          currentSelection = null;
        }

        const part = document.querySelector("Transform[DEF='" + partDEF + "']");
        if (!part) {
          console.warn("Part with DEF='" + partDEF + "' not found.");
          return;
        }

        // Ensure baseline exists for this part before applying overrides
        try { if (!baselineByPart.get(part) || baselineByPart.get(part).length === 0) captureBaseline(part); } catch (e) { /* ignore */ }
        // Apply yellow selection color (same method as hover, no injected Material)
        setPartColor(part, Colors.select);
        currentSelection = part;
        updateHideUI();
      }

      // Hide the currently selected part by setting visible=false
      function hidePart() {
        if (!currentSelection) return;
        try {
          const partDEF = currentSelection.getAttribute('DEF');
          currentSelection.setAttribute('visible', 'false');
          hiddenParts.add(partDEF);
          console.log('hidePart:', partDEF);
          updateHideUI();
        } catch (e) { console.log('hidePart error:', e); }
      }

      // Show all hidden parts
      function restoreAllParts() {
        for (const partDEF of hiddenParts) {
          const part = document.querySelector("Transform[DEF='" + partDEF + "']");
          if (part) {
            try {
              part.setAttribute('visible', 'true');
              console.log('restored:', partDEF);
            } catch (e) { /* ignore */ }
          }
        }
        hiddenParts.clear();
        updateHideUI();
      }

      // Update visibility of hide/restore buttons based on state
      function updateHideUI() {
        const hideBtn = document.getElementById('hide-selected-btn');
        const restoreBtn = document.getElementById('restore-all-btn');
        if (hideBtn) hideBtn.style.display = currentSelection && !hiddenParts.has(currentSelection.getAttribute('DEF')) ? 'block' : 'none';
        if (restoreBtn) restoreBtn.style.display = hiddenParts.size > 0 ? 'block' : 'none';
      }

      // Attach hover handlers which set hover color unless that part is selected
      function attachHoverHandlers(part) {
        part.addEventListener('mouseover', function () {
          if (currentSelection === part) return;
          try { console.log('hover over', part.getAttribute && part.getAttribute('DEF')); } catch (e) { }
          try { if (!baselineByPart.get(part) || baselineByPart.get(part).length === 0) captureBaseline(part); } catch (e) { }
          setPartColor(part, Colors.hover);
        });
        part.addEventListener('mouseout', function () {
          if (currentSelection === part) return;
          try { console.log('hover out', part.getAttribute && part.getAttribute('DEF')); } catch (e) { }
          restorePartFromBaseline(part);
        })
      }

      // Initialize once X3DOM runtime is ready
      x3dom.runtime.ready = function () {
        // Reset view to ensure consistent start
        var x3dElement = document.getElementById('x3dElement');
        if (x3dElement && x3dElement.runtime && x3dElement.runtime.resetView) {
          try { x3dElement.runtime.resetView(); } catch (e) { /* ignore */ }
        }

        // Capture baselines and attach hover handlers for each defined part
        for (let i = 0; i < PART_DEFS.length; i++) {
          const def = PART_DEFS[i];
          const part = document.querySelector("Transform[DEF='" + def + "']");
          if (!part) {
            try { console.log('ready: part not found', def); } catch (e) { }
            continue;
          }
          try { captureBaseline(part); } catch (e) { /* ignore */ }
          attachHoverHandlers(part);
          try { console.log('ready: attached handlers for', def, 'materials:', getMaterials(part)); } catch (e) { }
        }
      };

      // --- showDetail keeps same signature as your original page ---
      function showDetail(partName) {
        console.log("Clicked on:", partName);

        let infoTitle = "";
        let infoDescription = "";
        let graphImageFile = ""; 

        const graphContainer = document.getElementById('graph-container');
        if (graphContainer) graphContainer.style.display = 'none';

        // If the partName matches a known part, use the INFO block; else show initial text
        if (PART_DEFS.includes(partName)) {
          const info = INFO[partName];
          infoTitle = info.title;
          infoDescription = info.text;
          // map images same as original logic
          if (partName === 'Wing') graphImageFile = 'Graph2.png';
          if (partName === 'Fuselage' || partName === 'Canopy' || partName === 'HorStab') graphImageFile = 'Graph1.png';

          // Select and color the part (yellow). Selection is only applied for recognized parts.
          selectPartByDEF(partName);
        } else {
          // Default intro: show initial text and clear any selection without altering materials unexpectedly
          infoTitle = "FA-24 HellStinger";
          infoDescription = initialText;

          // If a part is currently selected, restore it
          if (currentSelection) {
            try { restorePartFromBaseline(currentSelection); } catch (e) { /* ignore */ }
            currentSelection = null;
          }
          updateHideUI();
        }

        // Update DOM text
        const titleEl = document.getElementById('info-title');
        const descEl = document.getElementById('info-description');
        if (titleEl) titleEl.innerText = infoTitle;
        if (descEl) descEl.innerHTML = infoDescription;

        // Show graph if present
        if (graphImageFile) {
          const img = document.getElementById('graph-image');
          if (img) img.src = graphImageFile;
          if (graphContainer) graphContainer.style.display = 'block';
        }
      }

      // Expose bindButtonName for the radio buttons (no change)
      function bindButtonName(viewpointID) 
      {
        console.log(viewpointID);
        document.getElementById(viewpointID).bind = true;
      }

      // Show the intro on DOM ready
      document.addEventListener("DOMContentLoaded", function() {
        showDetail('initial');
      });
    </script>
</head>
