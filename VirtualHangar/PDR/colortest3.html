
<!DOCTYPE html>

    <title>SuperDuperHornet</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      html, body {
         height: 100%;
      }
      #HUDs_Div {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;
        background-color: rgba(255, 255, 255, 0.7);
        padding: 10px;
        border-radius: 5px;
        font-family: sans-serif;
      }
      /* Container for text and graph, allowing side-by-side layout */
      #output-container {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
        color: white; /* White text */
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 80%;
        max-width: 1000px; /* Increased max-width for graph space */
        font-family: sans-serif;
        font-size: 1.1em;
        line-height: 1.4;
        display: flex; /* Enable flexbox for side-by-side content */
        justify-content: center;
        align-items: flex-start; 
        gap: 20px; /* Space between text and graph */
      }
      #output-text {
        flex: 1; /* Allows text to take available space */
        text-align: left; 
      }
      #output-text h3 {
        margin-top: 0;
      }
      #output-text p {
        margin-bottom: 0;
      }
      #graph-container {
        flex: 0 0 350px; /* Fixed width for the graph (adjust as needed) */
        display: none; /* Hidden by default */
        text-align: center;
      }
      #graph-container img {
        max-width: 100%;
        height: auto;
        border-radius: 5px;
      }

    <script>
      // ------------------------------
      // Color-based highlighting system
      // Hover -> cyan ; Click/select -> yellow
      // Restore -> remove emissive, fall back to subsystem diffuseColor
      // ------------------------------

      const PART_DEFS = [
        'Fuselage',
        'Canopy',
        'HorStab',
        'VTail',
        'Wing',
        'Inlet',
        'Box'
      ];

      const INFO = {
        Fuselage: {
          title: 'Plane Fuselage',
          text: "stores fuel and stuff",
        },
        Canopy: {
          title: 'Canopy',
          text: "super awesome pilot man",
        },
        HorStab: {
          title: 'Horizontal Stabilators',
          text: "supermaneuverability go brrrrrr",
        },
        VTail: {
          title: 'V-Tail',
          text: "V-tail so we aren't the size of New York on radar",
        },
        Wing: {
          title: 'Wings',
          text: 'Red Bull gives you wiiiiiiiiiiiiings',
        },
        Inlet: {
          title: 'Engine Inlets',
          text: 'feed air to the Very Hungry Catipillar of our 2 F-110 engines',
        },
        Box: {
          title: 'box',
          text: 'box box box',
        }
      };

      // Subsystem color map — add/edit entries here as you divide parts by subsystem.
      // Colors are RGB triplets (each channel 0–1).
      const SUBSYSTEM_COLORS = {
        // Airframe
        Fuselage: '0.45 0.50 0.55',  // steel gray
        Canopy:   '0.20 0.65 0.85',  // glass blue
        // Aerosurfaces
        Wing:     '0.30 0.55 0.40',  // muted green
        HorStab:  '0.30 0.55 0.40',  // muted green
        VTail:    '0.30 0.55 0.40',  // muted green
        // Propulsion
        Inlet:    '0.75 0.45 0.20',  // amber
        // Other
        Box:      '0.50 0.30 0.70',  // purple
      };

      const initialText = "hi we are Roy and Sons and we da best";

      const Colors = { hover: '0 1 1', select: '1 1 0' };

      let currentSelection = null;
      const hiddenParts = new Set();

      // Find PhysicalMaterial and classic Material nodes under a Transform
      function getMaterials(part) {
        return {
          phys:    Array.from(part.getElementsByTagName('PhysicalMaterial')),
          classic: Array.from(part.getElementsByTagName('Material')),
        };
      }

      // Set emissive highlight color. emissiveFactor drives intensity high enough
      // to overpower X3DOM's built-in red pick highlight.
      function setPartColor(part, color) {
        const { phys, classic } = getMaterials(part);
        for (const el of phys) {
          try { el.setAttribute('emissiveColor',  color); } catch (e) {}
          try { el.setAttribute('emissiveFactor', '8');   } catch (e) {}
        }
        for (const el of classic) {
          try { el.setAttribute('emissiveColor', color); } catch (e) {}
        }
      }

      // Remove emissive attributes so the part returns to its subsystem diffuseColor.
      function restorePart(part) {
        const { phys, classic } = getMaterials(part);
        for (const el of phys) {
          try { el.removeAttribute('emissiveColor');  } catch (e) {}
          try { el.removeAttribute('emissiveFactor'); } catch (e) {}
        }
        for (const el of classic) {
          try { el.removeAttribute('emissiveColor'); } catch (e) {}
        }
      }

      // Apply a subsystem diffuseColor to a part after its Inline has loaded.
      // This becomes the natural resting appearance restore() returns to.
      function applySubsystemColor(partDEF) {
        const color = SUBSYSTEM_COLORS[partDEF];
        if (!color) return;
        const part = document.querySelector("Transform[DEF='" + partDEF + "']");
        if (!part) return;
        const { phys, classic } = getMaterials(part);
        for (const el of phys) {
          try { el.setAttribute('diffuseColor',  color); } catch (e) {}
          try { el.setAttribute('diffuseFactor', '1');   } catch (e) {}
          try { el.removeAttribute('emissiveColor');     } catch (e) {}
          try { el.removeAttribute('emissiveFactor');    } catch (e) {}
        }
        for (const el of classic) {
          try { el.setAttribute('diffuseColor', color); } catch (e) {}
          try { el.removeAttribute('emissiveColor');    } catch (e) {}
        }
        console.log('applySubsystemColor:', partDEF, color);
      }

      // Reapply all subsystem colors at once (call from console if needed).
      function setupColors() {
        for (const def of PART_DEFS) { applySubsystemColor(def); }
      }

      // Select a part: restore old selection, then highlight the new one.
      function selectPartByDEF(partDEF) {
        if (!PART_DEFS.includes(partDEF)) return;
        if (currentSelection) {
          try { restorePart(currentSelection); } catch (e) {}
          currentSelection = null;
        }
        const part = document.querySelector("Transform[DEF='" + partDEF + "']");
        if (!part) { console.warn("Part not found:", partDEF); return; }
        setPartColor(part, Colors.select);
        currentSelection = part;
        updateHideUI();
      }

      // Hide the currently selected part
      function hidePart() {
        if (!currentSelection) return;
        const partDEF = currentSelection.getAttribute('DEF');
        currentSelection.setAttribute('visible', 'false');
        hiddenParts.add(partDEF);
        updateHideUI();
      }

      // Show all hidden parts
      function restoreAllParts() {
        for (const partDEF of hiddenParts) {
          const part = document.querySelector("Transform[DEF='" + partDEF + "']");
          if (part) { try { part.setAttribute('visible', 'true'); } catch (e) {} }
        }
        hiddenParts.clear();
        updateHideUI();
      }

      // Update hide/restore button visibility
      function updateHideUI() {
        const hideBtn    = document.getElementById('hide-selected-btn');
        const restoreBtn = document.getElementById('restore-all-btn');
        if (hideBtn)    hideBtn.style.display    = currentSelection && !hiddenParts.has(currentSelection.getAttribute('DEF')) ? 'block' : 'none';
        if (restoreBtn) restoreBtn.style.display = hiddenParts.size > 0 ? 'block' : 'none';
      }

      // Hover: highlight on enter, restore on leave (skip if already selected)
      function attachHoverHandlers(part) {
        part.addEventListener('mouseover', function () {
          if (currentSelection === part) return;
          setPartColor(part, Colors.hover);
        });
        part.addEventListener('mouseout', function () {
          if (currentSelection === part) return;
          restorePart(part);
        });
      }

      // Initialize once X3DOM runtime is ready
      x3dom.runtime.ready = function () {
        const x3dElement = document.getElementById('x3dElement');
        if (x3dElement && x3dElement.runtime && x3dElement.runtime.resetView) {
          try { x3dElement.runtime.resetView(); } catch (e) {}
        }

        for (const def of PART_DEFS) {
          const part = document.querySelector("Transform[DEF='" + def + "']");
          if (!part) { console.log('ready: part not found', def); continue; }

          attachHoverHandlers(part);

          // Apply subsystem color once the Inline's GLB finishes loading
          const inlineEl = document.querySelector("Inline[DEF='" + def + "Inline']");
          if (inlineEl) {
            inlineEl.addEventListener('load', function () {
              applySubsystemColor(def);
            });
          }
        }
      };

      // --- showDetail ---
      function showDetail(partName) {
        console.log("Clicked on:", partName);

        let infoTitle = "";
        let infoDescription = "";
        let graphImageFile = ""; 

        const graphContainer = document.getElementById('graph-container');
        if (graphContainer) graphContainer.style.display = 'none';

        // If the partName matches a known part, use the INFO block; else show initial text
        if (PART_DEFS.includes(partName)) {
          const info = INFO[partName];
          infoTitle = info.title;
          infoDescription = info.text;
          // map images same as original logic
          if (partName === 'Wing') graphImageFile = 'Graph2.png';
          if (partName === 'Fuselage' || partName === 'Canopy' || partName === 'HorStab') graphImageFile = 'Graph1.png';

          // Select and color the part (yellow). Selection is only applied for recognized parts.
          selectPartByDEF(partName);
        } else {
          // Default intro: show initial text and clear any selection without altering materials unexpectedly
          infoTitle = "FA-24 HellStinger";
          infoDescription = initialText;

          // If a part is currently selected, restore it
          if (currentSelection) {
            try { restorePart(currentSelection); } catch (e) {}
            currentSelection = null;
          }
          updateHideUI();
        }

        // Update DOM text
        const titleEl = document.getElementById('info-title');
        const descEl = document.getElementById('info-description');
        if (titleEl) titleEl.innerText = infoTitle;
        if (descEl) descEl.innerHTML = infoDescription;

        // Show graph if present
        if (graphImageFile) {
          const img = document.getElementById('graph-image');
          if (img) img.src = graphImageFile;
          if (graphContainer) graphContainer.style.display = 'block';
        }
      }

      // Expose bindButtonName for the radio buttons (no change)
      function bindButtonName(viewpointID) 
      {
        console.log(viewpointID);
        document.getElementById(viewpointID).bind = true;
      }

      // Show the intro on DOM ready
      document.addEventListener("DOMContentLoaded", function() {
        showDetail('initial');
      });
    </script>
