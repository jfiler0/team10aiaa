        <script>
      // ------------------------------
      // Color-based highlighting system
      // Hover -> magenta ; Click/select -> green
      // Supports X3D Inline async loading
      // ------------------------------

      const PART_DEFS = [
        'Fuselage', 'Canopy', 'HorStab', 'VTail', 'Wing', 'Inlet', 'Box'
      ];

      // Default color for X3D parts with no material (prevents white rendering)
      const DEFAULT_PART_COLOR = '0.6 0.6 0.7';

      const INFO = {
        Fuselage: { title: 'Plane Fuselage', text: "stores fuel and stuff" },
        Canopy:   { title: 'Canopy',         text: "super awesome pilot man" },
        HorStab:  { title: 'Horizontal Stabilators', text: "supermaneuverability go brrrrrr" },
        VTail:    { title: 'V-Tail',         text: "V-tail so we aren't the size of New York on radar" },
        Wing:     { title: 'Wings',          text: 'Red Bull gives you wiiiiiiiiiiiiings' },
        Inlet:    { title: 'Engine Inlets',  text: 'feed air to the Very Hungry Catipillar of our 2 F-110 engines' },
        Box:      { title: 'box',           text: 'box box box' }
      };

      const initialText = "hi we are Roy and Sons and we da best";
      const Colors = { hover: '1 0 1', select: '0 1 0' };

      let currentSelection = null;
      const baselineByPart = new Map();
      const elementBaseline = new WeakMap();
      const hiddenParts = new Set();

      // ---------- x3dom runtime color helpers ----------
      // x3dom parses the scene on load into an internal scene graph (_x3domNode).
      // After that, DOM changes are ignored by the renderer — we must operate
      // directly on _x3domNode objects.
      //
      // For X3D parts exported by Blender, <Appearance> is empty (no Material child).
      // x3dom creates an Appearance _x3domNode but with no Material child node.
      // We use x3dom's own addChild() to programmatically insert a Material runtime
      // node into the Appearance, which DOES get rendered.

      const DEFAULT_DIFFUSE = { r: 0.6, g: 0.6, b: 0.7 };

      // Trigger x3dom to re-render a node
      function invalidateNode(rn) {
        try { rn.invalidateCache(); } catch(e) {}
        try {
          let n = rn;
          while (n) { try { n.setAllDirty && n.setAllDirty(); } catch(e){} n = n._parentNodes && n._parentNodes[0]; }
        } catch(e) {}
        try { x3dom.canvases[0] && x3dom.canvases[0].doc && x3dom.canvases[0].doc.needRender = true; } catch(e) {}
      }

      // Set diffuse + emissive on a Material or PhysicalMaterial _x3domNode
      function setRuntimeColor(rn, diffuse, emissive) {
        try {
          if (diffuse) {
            rn._vf.diffuseColor = new x3dom.fields.SFColor(diffuse.r, diffuse.g, diffuse.b);
          }
        } catch(e) {}
        try {
          if (emissive) {
            rn._vf.emissiveColor = new x3dom.fields.SFColor(emissive.r, emissive.g, emissive.b);
          }
        } catch(e) {}
        invalidateNode(rn);
      }

      // For a Shape's Appearance _x3domNode, find or create a Material child _x3domNode.
      // Returns the Material _x3domNode or null.
      function getOrCreateMaterialNode(appRN) {
        if (!appRN) return null;

        // Look for existing Material child
        if (appRN._childNodes) {
          for (const child of appRN._childNodes) {
            if (child && child._vf && 'diffuseColor' in child._vf && !('baseColor' in child._vf)) {
              return child; // classic Material
            }
          }
        }

        // No Material child — create one via x3dom's own API
        try {
          // Create a DOM node in the correct namespace so x3dom recognises it
          const ns = 'http://www.web3d.org/specifications/x3d-namespace';
          let matDom = document.createElementNS(ns, 'Material');
          // Fall back to uppercase tag if namespace version doesn't work
          if (!matDom || matDom.nodeName === 'Material' && !x3dom.nodeTypes['Material']) {
            matDom = document.createElement('material'); // x3dom lowercases anyway
          }
          matDom.setAttribute('diffuseColor',
            DEFAULT_DIFFUSE.r + ' ' + DEFAULT_DIFFUSE.g + ' ' + DEFAULT_DIFFUSE.b);

          // x3dom processes nodes via its document's setupTree
          const x3dDoc = x3dom.canvases[0] && x3dom.canvases[0].doc;
          if (x3dDoc && x3dDoc.setupTree) {
            x3dDoc.setupTree(matDom);
          }

          if (matDom._x3domNode) {
            // Wire into the scene graph
            appRN.addChild(matDom._x3domNode, 'material');
            invalidateNode(appRN);
            return matDom._x3domNode;
          }
        } catch(e) {
          console.log('getOrCreateMaterialNode error:', e);
        }
        return null;
      }

      // Get all colorable runtime nodes under a part Transform
      function getRuntimeMaterials(part) {
        const shapes = Array.from(part.getElementsByTagName('Shape'));
        const result = [];
        for (const s of shapes) {
          const shapeRN = s._x3domNode;
          if (!shapeRN) continue;

          // Find Appearance child
          let appRN = null;
          if (shapeRN._childNodes) {
            for (const c of shapeRN._childNodes) {
              if (c && c._vf && 'visible' in c._vf === false && c._childNodes) {
                appRN = c; break; // Appearance node heuristic
              }
              // More reliable: check constructor name
              if (c && c.constructor && c.constructor.name === 'x3dom.nodeTypes.Appearance') {
                appRN = c; break;
              }
            }
          }
          // Fallback: try _appearance field
          if (!appRN) appRN = shapeRN._cf && shapeRN._cf.appearance && shapeRN._cf.appearance.node;

          if (!appRN) continue;

          // Check for PhysicalMaterial (GLB)
          if (appRN._childNodes) {
            for (const c of appRN._childNodes) {
              if (c && c.constructor && c.constructor.name === 'x3dom.nodeTypes.PhysicalMaterial') {
                result.push({ rn: c, type: 'phys' });
              }
            }
          }
          if (result.length && result[result.length-1].type === 'phys') continue;

          // Classic Material — find or create
          const matRN = getOrCreateMaterialNode(appRN);
          if (matRN) result.push({ rn: matRN, type: 'classic' });
        }
        return result;
      }

      // Capture baseline colors from runtime nodes
      function captureBaseline(part) {
        const rms = getRuntimeMaterials(part);
        const baseline = [];
        for (const { rn, type } of rms) {
          try {
            const dc = rn._vf && rn._vf.diffuseColor;
            const ec = rn._vf && rn._vf.emissiveColor;
            baseline.push({
              rn,
              type,
              diffuse:  dc ? { r: dc.r, g: dc.g, b: dc.b } : { ...DEFAULT_DIFFUSE },
              emissive: ec ? { r: ec.r, g: ec.g, b: ec.b } : { r: 0, g: 0, b: 0 },
            });
          } catch(e) {}
        }
        baselineByPart.set(part, baseline);
        console.log('captureBaseline', part.getAttribute('DEF'), 'runtime nodes:', baseline.length);
      }

      function setPartColor(part, colorStr) {
        const c = parseColor(colorStr);
        if (!c) return;
        const items = baselineByPart.get(part) || [];
        for (const { rn, type } of items) {
          if (type === 'phys') setRuntimeColor(rn, { r:0.1, g:0.1, b:0.1 }, c);
          else                 setRuntimeColor(rn, c, c);
        }
      }

      function restorePartFromBaseline(part) {
        const items = baselineByPart.get(part) || [];
        for (const { rn, diffuse, emissive } of items) {
          setRuntimeColor(rn, diffuse, emissive);
        }
      }

      // Parse "r g b" string → {r,g,b}
      function parseColor(str) {
        if (!str) return null;
        const p = str.trim().split(/[\s,]+/).map(Number);
        if (p.length < 3 || p.some(isNaN)) return null;
        return { r: p[0], g: p[1], b: p[2] };
      }

      // ---------- Part setup (called after each Inline finishes loading) ----------

      // After an Inline loads, x3dom parses the content into its internal scene graph,
      // but _x3domNode handles may not be live immediately.
      // We poll until Shape _x3domNode handles exist, log the scene graph structure
      // for debugging, then apply the default color and capture baselines.
      function setupPart(part) {
        const def = part.getAttribute('DEF');
        console.log('setupPart:', def);

        if (baselineByPart.has(part)) return; // guard against double-setup

        let attempts = 0;
        const trySetup = function() {
          attempts++;

          // Wait until Shape _x3domNode handles are live
          const shapes = Array.from(part.getElementsByTagName('Shape'));
          const shapeRNsReady = shapes.length > 0 && shapes.every(s => !!s._x3domNode);

          if (!shapeRNsReady && attempts < 60) {
            setTimeout(trySetup, 50);
            return;
          }
          if (!shapeRNsReady) {
            console.warn(def, ': Shape _x3domNode never became live');
            attachHoverHandlers(part);
            return;
          }

          // Debug: log the scene graph structure so we can see what x3dom built
          for (const s of shapes) {
            const sRN = s._x3domNode;
            console.log(def, 'Shape RN:', sRN && sRN.constructor && sRN.constructor.name);
            if (sRN && sRN._childNodes) {
              sRN._childNodes.forEach((c, i) => console.log('  child', i,
                c && c.constructor && c.constructor.name,
                c && c._vf && Object.keys(c._vf).slice(0, 6)));
            }
            if (sRN && sRN._cf) {
              const appNode = sRN._cf.appearance && sRN._cf.appearance.node;
              console.log('  appearance node:', appNode && appNode.constructor && appNode.constructor.name);
              if (appNode && appNode._childNodes) {
                appNode._childNodes.forEach((c, i) => console.log('  app child', i,
                  c && c.constructor && c.constructor.name,
                  c && c._vf && Object.keys(c._vf).slice(0, 6)));
              }
            }
          }

          const rms = getRuntimeMaterials(part);
          if (rms.length === 0 && attempts < 60) {
            setTimeout(trySetup, 50);
            return;
          }
          if (rms.length === 0) {
            console.warn(def, ': gave up waiting for runtime material nodes');
            attachHoverHandlers(part);
            return;
          }

          // Apply default grey-blue to X3D parts (overrides x3dom white default)
          const black = { r: 0, g: 0, b: 0 };
          for (const { rn, type } of rms) {
            if (type === 'classic') setRuntimeColor(rn, DEFAULT_DIFFUSE, black);
          }

          captureBaseline(part);
          attachHoverHandlers(part);
          console.log(def, 'fully initialized,', rms.length, 'runtime node(s)');
        };

        setTimeout(trySetup, 100);
      }

      // ---------- Interaction ----------

      function selectPartByDEF(partDEF) {
        if (!PART_DEFS.includes(partDEF)) return;
        if (currentSelection) {
          restorePartFromBaseline(currentSelection);
          currentSelection = null;
        }
        const part = document.querySelector("Transform[DEF='" + partDEF + "']");
        if (!part) { console.warn('Part not found:', partDEF); return; }
        setPartColor(part, Colors.select);
        currentSelection = part;
        updateHideUI();
      }

      function hidePart() {
        if (!currentSelection) return;
        const partDEF = currentSelection.getAttribute('DEF');
        currentSelection.setAttribute('visible', 'false');
        hiddenParts.add(partDEF);
        updateHideUI();
      }

      function restoreAllParts() {
        for (const partDEF of hiddenParts) {
          const part = document.querySelector("Transform[DEF='" + partDEF + "']");
          if (part) part.setAttribute('visible', 'true');
        }
        hiddenParts.clear();
        updateHideUI();
      }

      function updateHideUI() {
        const hideBtn    = document.getElementById('hide-selected-btn');
        const restoreBtn = document.getElementById('restore-all-btn');
        if (hideBtn)    hideBtn.style.display    = currentSelection && !hiddenParts.has(currentSelection.getAttribute('DEF')) ? 'block' : 'none';
        if (restoreBtn) restoreBtn.style.display = hiddenParts.size > 0 ? 'block' : 'none';
      }

      function attachHoverHandlers(part) {
        part.addEventListener('mouseover', function () {
          if (currentSelection === part) return;
          setPartColor(part, Colors.hover);
        });
        part.addEventListener('mouseout', function () {
          if (currentSelection === part) return;
          restorePartFromBaseline(part);
        });
      }

      // ---------- Initialization ----------

      // KEY FIX: wait for each Inline to finish loading before setting up its part.
      // x3dom.runtime.ready fires BEFORE Inline content is parsed.
      // setupPart() handles its own retry loop for _x3domNode availability.
      function waitForInlineAndSetup(inlineEl, partDef) {
        const part = document.querySelector("Transform[DEF='" + partDef + "']");
        if (!part) return;

        let triggered = false;

        inlineEl.addEventListener('load', function () {
          console.log('Inline loaded for:', partDef);
          triggered = true;
          setupPart(part);
        });

        // Fallback poll only for cached files where load event may have already fired
        let attempts = 0;
        const poll = setInterval(function () {
          attempts++;
          if (triggered || baselineByPart.has(part)) { clearInterval(poll); return; }
          if (part.getElementsByTagName('Shape').length > 0) {
            clearInterval(poll);
            console.log('Inline poll fallback for:', partDef);
            setupPart(part);
          }
          if (attempts > 80) clearInterval(poll);
        }, 100);
      }

      x3dom.runtime.ready = function () {
        var x3dElement = document.getElementById('x3dElement');
        if (x3dElement && x3dElement.runtime && x3dElement.runtime.resetView) {
          try { x3dElement.runtime.resetView(); } catch (e) { }
        }

        const inlineMap = {
          Fuselage: 'FuselageInline',
          Wing:     'WingInline',
          Canopy:   'CanopyInline',
          HorStab:  'HorStabInline',
          VTail:    'VTailInline',
          Inlet:    'InletInline',
        };

        for (const [partDef, inlineDef] of Object.entries(inlineMap)) {
          const inlineEl = document.querySelector("Inline[DEF='" + inlineDef + "']");
          if (inlineEl) waitForInlineAndSetup(inlineEl, partDef);
          else console.log('Inline element not found:', inlineDef);
        }

        const boxInline = document.querySelector("Inline[DEF='BoxInline']");
        if (boxInline) waitForInlineAndSetup(boxInline, 'Box');
      };

      // --- showDetail: called by onclick on plane parts and ground plane ---
      function showDetail(partName) {
        console.log("Clicked on:", partName);

        let infoTitle = "";
        let infoDescription = "";
        let graphImageFile = "";

        const graphContainer = document.getElementById('graph-container');
        if (graphContainer) graphContainer.style.display = 'none';

        if (PART_DEFS.includes(partName)) {
          const info = INFO[partName];
          infoTitle = info.title;
          infoDescription = info.text;
          if (partName === 'Wing') graphImageFile = 'Graph2.png';
          if (partName === 'Fuselage' || partName === 'Canopy' || partName === 'HorStab') graphImageFile = 'Graph1.png';
          selectPartByDEF(partName);
        } else {
          infoTitle = "FA-24 HellStinger";
          infoDescription = initialText;
          if (currentSelection) {
            try { restorePartFromBaseline(currentSelection); } catch (e) { }
            currentSelection = null;
          }
          updateHideUI();
        }

        const titleEl = document.getElementById('info-title');
        const descEl  = document.getElementById('info-description');
        if (titleEl) titleEl.innerText = infoTitle;
        if (descEl)  descEl.innerHTML  = infoDescription;

        if (graphImageFile) {
          const img = document.getElementById('graph-image');
          if (img) img.src = graphImageFile;
          if (graphContainer) graphContainer.style.display = 'block';
        }
      }

      // Expose bindButtonName for the radio buttons
      function bindButtonName(viewpointID) {
        console.log(viewpointID);
        document.getElementById(viewpointID).bind = true;
      }

      // Show the intro on DOM ready
      document.addEventListener("DOMContentLoaded", function () {
        showDetail('initial');
      });
    </script>
