      // ---------- x3dom runtime color helpers ----------
      // x3dom parses X3D/GLB into an internal scene graph on load. After that,
      // setAttribute on DOM Material nodes does NOT update the rendered color —
      // you must set values on the _x3domNode runtime object directly.
      //
      // Strategy:
      //  1. Walk all Shape nodes under a part.
      //  2. For each Shape, get the Appearance -> Material _x3domNode.
      //     If none exists (Blender X3D exports empty <Appearance>), create a
      //     real DOM <Material> node so x3dom registers one, then grab its runtime.
      //  3. Directly set diffuseColor / emissiveColor on the runtime node and
      //     call x3dom's invalidate so the change renders.

      const DEFAULT_DIFFUSE = { r: 0.6, g: 0.6, b: 0.7 };

      // Parse "r g b" string → {r,g,b}
      function parseColor(str) {
        if (!str) return null;
        const p = str.trim().split(/[\s,]+/).map(Number);
        if (p.length < 3 || p.some(isNaN)) return null;
        return { r: p[0], g: p[1], b: p[2] };
      }

      // Set color on a single x3dom Material runtime node
      function setRuntimeColor(rn, diffuse, emissive) {
        try {
          if (diffuse)  rn.setDiffuseColor(new x3dom.fields.SFColor(diffuse.r,  diffuse.g,  diffuse.b));
        } catch(e) {
          try { rn._vf.diffuseColor  = new x3dom.fields.SFColor(diffuse.r,  diffuse.g,  diffuse.b); } catch(e2){}
        }
        try {
          if (emissive) rn.setEmissiveColor(new x3dom.fields.SFColor(emissive.r, emissive.g, emissive.b));
        } catch(e) {
          try { rn._vf.emissiveColor = new x3dom.fields.SFColor(emissive.r, emissive.g, emissive.b); } catch(e2){}
        }
        try { rn.invalidateCache(); } catch(e){}
      }

      // Get (or create) the x3dom Material runtime node for a Shape DOM element.
      // Returns null if unavailable.
      function getMaterialRuntime(shapeEl) {
        // Try Appearance -> Material path
        let app = shapeEl.querySelector('Appearance');
        if (!app) {
          app = document.createElement('Appearance');
          shapeEl.appendChild(app);
        }
        let matEl = app.querySelector('Material');
        if (!matEl) {
          // Blender X3D: <Appearance> is empty. Insert a real Material node so
          // x3dom will register it. We must do this before x3dom processes the
          // node, but if we're here after load we force a re-init via x3dom API.
          matEl = document.createElement('Material');
          matEl.setAttribute('diffuseColor', DEFAULT_DIFFUSE.r + ' ' + DEFAULT_DIFFUSE.g + ' ' + DEFAULT_DIFFUSE.b);
          matEl.setAttribute('data-injected', 'true');
          app.appendChild(matEl);
        }
        // Return the _x3domNode runtime handle if available
        if (matEl._x3domNode) return matEl._x3domNode;
        return null;
      }

      // Collect all Material runtime nodes under a part Transform
      function getRuntimeMaterials(part) {
        const shapes = Array.from(part.getElementsByTagName('Shape'));
        const result = [];
        for (const s of shapes) {
          // PhysicalMaterial (GLB/PBR path)
          const physEl = s.querySelector('Appearance > PhysicalMaterial');
          if (physEl && physEl._x3domNode) { result.push({ rn: physEl._x3domNode, type: 'phys' }); continue; }
          // Classic Material
          const rn = getMaterialRuntime(s);
          if (rn) result.push({ rn, type: 'classic' });
        }
        return result;
      }

      // Capture baseline colors from runtime nodes
      function captureBaseline(part) {
        const rms = getRuntimeMaterials(part);
        const baseline = [];
        for (const { rn, type } of rms) {
          try {
            const dc = rn._vf && rn._vf.diffuseColor;
            const ec = rn._vf && rn._vf.emissiveColor;
            baseline.push({
              rn,
              type,
              diffuse:  dc ? { r: dc.r, g: dc.g, b: dc.b } : { ...DEFAULT_DIFFUSE },
              emissive: ec ? { r: ec.r, g: ec.g, b: ec.b } : { r: 0, g: 0, b: 0 },
            });
          } catch(e) {}
        }
        baselineByPart.set(part, baseline);
        console.log('captureBaseline', part.getAttribute('DEF'), 'runtime nodes:', baseline.length);
      }

      function setPartColor(part, colorStr) {
        const c = parseColor(colorStr);
        if (!c) return;
        const items = baselineByPart.get(part) || [];
        if (items.length === 0) {
          // Baseline not captured yet (e.g. part just loaded) — get fresh
          const rms = getRuntimeMaterials(part);
          for (const { rn, type } of rms) {
            if (type === 'phys') setRuntimeColor(rn, { r:0.1, g:0.1, b:0.1 }, c);
            else                 setRuntimeColor(rn, c, c);
          }
          return;
        }
        for (const { rn, type } of items) {
          if (type === 'phys') setRuntimeColor(rn, { r:0.1, g:0.1, b:0.1 }, c);
          else                 setRuntimeColor(rn, c, c);
        }
      }

      function restorePartFromBaseline(part) {
        const items = baselineByPart.get(part) || [];
        for (const { rn, diffuse, emissive } of items) {
          setRuntimeColor(rn, diffuse, emissive);
        }
      }

      // ---------- Part setup (called after each Inline finishes loading) ----------

      // After an Inline loads, x3dom has parsed the content into its scene graph.
      // We give it one extra tick (setTimeout 0) so _x3domNode handles are live,
      // then capture baselines and set the default color (fixing white parts).
      function setupPart(part) {
        const def = part.getAttribute('DEF');
        console.log('setupPart:', def);
        setTimeout(function() {
          // For X3D parts: force the default color onto any empty-Appearance shapes
          // by calling setPartColor with DEFAULT_DIFFUSE string before capturing baseline
          const shapes = Array.from(part.getElementsByTagName('Shape'));
          console.log(def, 'shapes found after timeout:', shapes.length);
          // First pass: ensure runtime material nodes exist and set default color
          for (const s of shapes) {
            const physEl = s.querySelector('Appearance > PhysicalMaterial');
            if (physEl && physEl._x3domNode) {
              // GLB part — already colored, just capture
            } else {
              // X3D part with empty Appearance: set the default diffuse directly
              const rn = getMaterialRuntime(s);
              if (rn) {
                const def2 = DEFAULT_DIFFUSE;
                setRuntimeColor(rn, def2, { r:0, g:0, b:0 });
              }
            }
          }
          captureBaseline(part);
          attachHoverHandlers(part);
        }, 0);
      }

      // ---------- Interaction ----------

      // -----------------------------------------------------------------------
      // getGroupParts  (new helper)
      // Given any partDEF, returns all Transform elements that should act as
      // one unit. Grouped parts return every member; ungrouped return just the
      // one part. This is the key function that drives group behavior.
      // -----------------------------------------------------------------------
      function getGroupParts(partDEF) {
        const groupKey = partToGroup[partDEF];
        if (!groupKey) {
          const el = document.querySelector("Transform[DEF='" + partDEF + "']");
          return el ? [el] : [];
        }
        return GROUPS[groupKey].parts
          .map(p => document.querySelector("Transform[DEF='" + p + "']"))
          .filter(Boolean);
      }
      // -----------------------------------------------------------------------

      // currentSelectionGroup holds ALL currently-selected Transform elements
      // (1 for ungrouped parts, N for grouped parts)
      let currentSelectionGroup = [];

      function selectPartByDEF(partDEF) {
        if (!PART_DEFS.includes(partDEF)) return;

        // Restore previously selected parts (however many there were)
        for (const p of currentSelectionGroup) restorePartFromBaseline(p);
        currentSelectionGroup = [];
        currentSelection = null;

        // Highlight every part in the group (or just the one clicked part)
        const targets = getGroupParts(partDEF);
        for (const p of targets) setPartColor(p, Colors.select);
        currentSelectionGroup = targets;
        currentSelection = targets[0] || null;   // kept for legacy hidePart() logic
        updateHideUI();
      }

      function hidePart() {
        if (!currentSelection) return;
        const partDEF = currentSelection.getAttribute('DEF');
        currentSelection.setAttribute('visible', 'false');
        hiddenParts.add(partDEF);
        updateHideUI();
      }

      function restoreAllParts() {
        for (const partDEF of hiddenParts) {
          const part = document.querySelector("Transform[DEF='" + partDEF + "']");
          if (part) part.setAttribute('visible', 'true');
        }
        hiddenParts.clear();
        updateHideUI();
      }

      function updateHideUI() {
        const hideBtn    = document.getElementById('hide-selected-btn');
        const restoreBtn = document.getElementById('restore-all-btn');
        if (hideBtn)    hideBtn.style.display    = currentSelection && !hiddenParts.has(currentSelection.getAttribute('DEF')) ? 'block' : 'none';
        if (restoreBtn) restoreBtn.style.display = hiddenParts.size > 0 ? 'block' : 'none';
      }

      function attachHoverHandlers(part) {
        const partDEF = part.getAttribute('DEF');
        part.addEventListener('mouseover', function () {
          // -----------------------------------------------------------------------
          // Group hover (new behavior)
          // On mouseover, highlight every part in the same group — not just this one.
          // If any group member is currently selected we skip (mirrors the old
          // single-part check of currentSelection === part).
          // -----------------------------------------------------------------------
          const targets = getGroupParts(partDEF);
          const anySelected = targets.some(p => currentSelectionGroup.includes(p));
          if (anySelected) return;
          for (const p of targets) setPartColor(p, Colors.hover);
        });
        part.addEventListener('mouseout', function () {
          const targets = getGroupParts(partDEF);
          const anySelected = targets.some(p => currentSelectionGroup.includes(p));
          if (anySelected) return;
          for (const p of targets) restorePartFromBaseline(p);
        });
      }

      // KEY FIX: wait for each Inline to finish loading before setting up its part.
      // x3dom.runtime.ready fires BEFORE Inline content is parsed — that's why
      // getMaterials() was finding 0 materials at startup.
      function waitForInlineAndSetup(inlineEl, partDef) {
        const part = document.querySelector("Transform[DEF='" + partDef + "']");
        if (!part) return;

        inlineEl.addEventListener('load', function () {
          console.log('Inline loaded for:', partDef);
          if (!baselineByPart.has(part)) setupPart(part);
        });

        // Polling fallback in case the load event already fired (cached file)
        let attempts = 0;
        const poll = setInterval(function () {
          attempts++;
          if (part.getElementsByTagName('Shape').length > 0) {
            clearInterval(poll);
            if (!baselineByPart.has(part)) {
              console.log('Inline poll found shapes for:', partDef);
              setupPart(part);
            }
          }
          if (attempts > 60) clearInterval(poll);
        }, 100);
      }

      // --- showDetail: called by onclick on plane parts and ground plane ---
      function showDetail(partName) {
        console.log("Clicked on:", partName);

        let infoTitle = "";
        let infoDescription = "";
        let graphImageFile = "";

        const graphContainer = document.getElementById('graph-container');
        if (graphContainer) graphContainer.style.display = 'none';

        if (PART_DEFS.includes(partName)) {
          // -----------------------------------------------------------------------
          // Group info lookup (new behavior, ~line 618)
          // If the clicked part belongs to a group, use the group's shared title
          // and text instead of the individual INFO entry.
          // -----------------------------------------------------------------------
          const groupKey = partToGroup[partName];
          if (groupKey) {
            infoTitle       = GROUPS[groupKey].title;
            infoDescription = GROUPS[groupKey].text;
          } else {
            const info  = INFO[partName];
            infoTitle   = info ? info.title : partName;
            infoDescription = info ? info.text : '';
          }
          // -----------------------------------------------------------------------
          if (partName === 'Wing') graphImageFile = 'Graph2.png';
          if (partName === 'Fuselage' || partName === 'Canopy' || partName === 'HorStab') graphImageFile = 'Graph1.png';
          selectPartByDEF(partName);
        } else {
          infoTitle = "FA-24 HellStinger";
          infoDescription = initialText;
          if (currentSelection) {
            try { restorePartFromBaseline(currentSelection); } catch (e) { }
            currentSelection = null;
          }
          updateHideUI();
        }

        const titleEl = document.getElementById('info-title');
        const descEl  = document.getElementById('info-description');
        if (titleEl) titleEl.innerText = infoTitle;
        if (descEl)  descEl.innerHTML  = infoDescription;

        if (graphImageFile) {
          const img = document.getElementById('graph-image');
          if (img) img.src = graphImageFile;
          if (graphContainer) graphContainer.style.display = 'block';
        }
      }

        document.getElementById(viewpointID).bind = true;
      }

      document.addEventListener("DOMContentLoaded", function () {
        showDetail('initial');
      });
