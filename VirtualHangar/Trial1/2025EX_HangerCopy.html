
<!DOCTYPE html>
<html>
<head>

    <title>SuperDuperHornet</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      #HUDs_Div {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 1000;
        background-color: rgba(255, 255, 255, 0.7);
        padding: 10px;
        border-radius: 5px;
        font-family: sans-serif;
      }
      /* Container for text and graph, allowing side-by-side layout */
      #output-container {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
        color: white; /* White text */
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 80%;
        max-width: 1000px; /* Increased max-width for graph space */
        font-family: sans-serif;
        font-size: 1.1em;
        line-height: 1.4;
        display: flex; /* Enable flexbox for side-by-side content */
        justify-content: center;
        align-items: flex-start; 
        gap: 20px; /* Space between text and graph */
      }
      #output-text {
        flex: 1; /* Allows text to take available space */
        text-align: left; 
      }
      #output-text h3 {
        margin-top: 0;
      }
      #output-text p {
        margin-bottom: 0;
      }
      #graph-container {
        flex: 0 0 350px; /* Fixed width for the graph (adjust as needed) */
        display: none; /* Hidden by default */
        text-align: center;
      }
      #graph-container img {
        max-width: 100%;
        height: auto;
        border-radius: 5px;
      }
    </style>

    <script>
      // ------------------------------
      // Color-based highlighting system
      // Hover -> cyan ; Click/select -> yellow
      // No bboxDisplay changes anywhere (no bounding boxes)
      // ------------------------------

      const PART_DEFS = [
        'FuselagePart',
        'WingPart',
        'ElectricEnginePart',
        'TailPart',
        'ExteriorEnginePart',
        'InteriorEnginePart'
      ];

      // Info object matching your original descriptions (shortened where repeated)
      const INFO = {
        FuselagePart: {
          title: 'Plane Fuselage',
          text:
            "SUSAN's is designed to accommodate up to 180 passengers (the same capacity as a large single-aisle plane) and boasts a 10 MW class EAP system to electrify this regional-class aircraft. The SUSAN concept was inspired by the idea that it may be possible to create a transport category aircraft with a single fuel burning engine if it is combined in a hybrid configuration with electric engines and an electrical power source.",
        },
        WingPart: {
          title: 'Wings',
          text:
            'The SUSAN aircraft has a wingspan of 116 ft. The wings have been designed for an 8.3% reduction in drag through studies of the laminar flow, or smooth-traveling airflow, over the aircraft wings. Additionally, the wings are designed for an efficient thermal management system with three loops at different temperatures that manage the engines, electrical system, and batteries.',
        },
        ElectricEnginePart: {
          title: 'Wing-Mounted Electric Engines',
          text:
            'The wing-mounted engines provide 65% of the total thrust of the aircraft and are entirely electric. They draw from the power generated by the tail-mounted turbojet engine through the generators and the rechargeable battery, and under nominal conditions the entire system is self-sufficient. The electric engines on either side of the plane are encased in an outer shell to reduce drag from the suction effect of the fanblades. Each wing-mounted electric engine has a system with a main generator converter, a rechargeable battery, a single use battery for emergency purposes, the electric engine motor, and circuitry.',
        },
        TailPart: {
          title: 'T-Tail',
          text:
            'The vertical tail features an innovative design in which the structure is partially embedded in the exterior of the engine and the primary loads are shared between the tail and the engine. This design also minimizes engine flow blockage, and was tested to optimize airflow along the body of the plane.',
        },
        ExteriorEnginePart: {
          title: 'Tail-Mounted Turbo Jet-Engine - Exterior',
          text:
            'The tail-mounted engine combines a traditional gas turbine with a mechanism called boundary layer ingesting (BLI) concept, that uses the flow along the body of the plane to produce the required thrust. It uses hydrocarbon fuel to provide 35% of the total thrust for the aircraft and generates the power required for the wing-mounted electric propulsors. The power is extracted and managed via generators and a rechargeable battery connected at the front of the engine to the wing-mounted propulsors. In case of turbo fan failure a single use battery is employed.',
        },
        InteriorEnginePart: {
          title: 'Tail-Mounted Turbo Jet-Engine - Interior',
          text:
            'The tail-mounted engine combines a traditional gas turbine with a mechanism called boundary layer ingesting (BLI) concept, that uses the flow along the body of the plane to produce the required thrust. It uses hydrocarbon fuel to provide 35% of the total thrust for the aircraft and generates the power required for the wing-mounted electric propulsors. The power is extracted and managed via generators and a rechargeable battery connected at the front of the engine to the wing-mounted propulsors. In case of turbo fan failure a single use battery is employed.',
        },
      };

      const initialText =
        "NASA's Subsonic Single Aft Engine (SUSAN) Electrofan is an advanced hybrid electric concept aircraft that could transform the future of commercial air travel by reducing fuel burn and improving performance. Take a look around and explore some of the unique features onboard the aircraft.<br><br>Navigate by clicking on the parts of the aircraft you wish to learn more about.";

      const Colors = { hover: '0 1 1', select: '0 0 0.5' };

      // Stores the currently selected Transform (if any)
      let currentSelection = null;
      // Stores baseline material attributes per Transform to restore later
      const baselineByPart = new Map();

      // Helpers to find material nodes under a Transform
      function getMaterials(part) {
        // X3D can have different material tag names; handle both
        const phys = Array.from(part.getElementsByTagName('PhysicalMaterial'));
        const classic = Array.from(part.getElementsByTagName('Material'));
        return { phys, classic };
      }

      // Capture baseline attributes so we can restore them later
      function captureBaseline(part) {
        const mats = getMaterials(part);
        const existing = baselineByPart.get(part) || [];
        const seen = new Set(existing.map(r => r.element));
        for (const el of mats.phys) {
          if (seen.has(el)) continue;
          existing.push({
            element: el,
            attr: 'diffuseFactor',
            value: el.getAttribute('diffuseFactor'),
            hadAttr: el.hasAttribute('diffuseFactor')
          });
          seen.add(el);
        }
        for (const el of mats.classic) {
          if (seen.has(el)) continue;
          existing.push({
            element: el,
            attr: 'diffuseColor',
            value: el.getAttribute('diffuseColor'),
            hadAttr: el.hasAttribute('diffuseColor')
          });
          seen.add(el);
        }
        baselineByPart.set(part, existing);
      }

      // Apply color to all material nodes under the part
      function setPartColor(part, color) {
        captureBaseline(part);
        const mats = getMaterials(part);
        for (const el of mats.phys) {
          try { el.setAttribute('diffuseFactor', color); } catch (e) { /* ignore */ }
        }
        for (const el of mats.classic) {
          try { el.setAttribute('diffuseColor', color); } catch (e) { /* ignore */ }
        }
      }

      // Restore saved baseline attributes
      function restorePartFromBaseline(part) {
        const records = baselineByPart.get(part) || [];
        for (const r of records) {
          if (r.hadAttr) {
            if (r.value === null || r.value === undefined) {
              // ensure we set empty string if original was empty
              r.element.setAttribute(r.attr, '');
            } else {
              r.element.setAttribute(r.attr, r.value);
            }
          } else {
            // attribute wasn't present originally -> remove it
            r.element.removeAttribute(r.attr);
          }
        }
      }

      // Select a part by DEF (only valid parts). Do NOT use for 'initial'.
      function selectPartByDEF(partDEF) {
        // Only allow selection for known parts
        if (!PART_DEFS.includes(partDEF)) return;

        // Restore previous selection (if any)
        if (currentSelection && currentSelection !== null) {
          try { restorePartFromBaseline(currentSelection); } catch (e) { /* ignore */ }
          currentSelection = null;
        }

        const part = document.querySelector("Transform[DEF='" + partDEF + "']");
        if (!part) {
          console.warn("Part with DEF='" + partDEF + "' not found.");
          return;
        }

        // Ensure we start from a clean baseline before applying selection color
        restorePartFromBaseline(part);
        setPartColor(part, Colors.select);
        currentSelection = part;
      }

      // Attach hover handlers which set hover color unless that part is selected
      function attachHoverHandlers(part) {
        part.addEventListener('mouseover', function () {
          if (currentSelection === part) return;
          setPartColor(part, Colors.hover);
        });
        part.addEventListener('mouseout', function () {
          if (currentSelection === part) return;
          restorePartFromBaseline(part);
        })
      }

      // Initialize once X3DOM runtime is ready
      x3dom.runtime.ready = function () {
        // Reset view to ensure consistent start
        var x3dElement = document.getElementById('x3dElement');
        if (x3dElement && x3dElement.runtime && x3dElement.runtime.resetView) {
          try { x3dElement.runtime.resetView(); } catch (e) { /* ignore */ }
        }

        // Capture baselines and attach hover handlers for each defined part
        for (let i = 0; i < PART_DEFS.length; i++) {
          const def = PART_DEFS[i];
          const part = document.querySelector("Transform[DEF='" + def + "']");
          if (!part) continue;
          try { captureBaseline(part); } catch (e) { /* ignore */ }
          attachHoverHandlers(part);
        }
      };

      // --- showDetail keeps same signature as your original page ---
      function showDetail(partName) {
        console.log("Clicked on:", partName);

        let infoTitle = "";
        let infoDescription = "";
        let graphImageFile = ""; 

        const graphContainer = document.getElementById('graph-container');
        if (graphContainer) graphContainer.style.display = 'none';

        // If the partName matches a known part, use the INFO block; else show initial text
        if (PART_DEFS.includes(partName)) {
          const info = INFO[partName];
          infoTitle = info.title;
          infoDescription = info.text;
          // map images same as original logic
          if (partName === 'WingPart') graphImageFile = 'Graph2.png';
          if (partName === 'ElectricEnginePart' || partName === 'ExteriorEnginePart' || partName === 'InteriorEnginePart') graphImageFile = 'Graph1.png';

          // Select and color the part (yellow). Selection is only applied for recognized parts.
          selectPartByDEF(partName);
        } else {
          // Default intro: show initial text and clear any selection without altering materials unexpectedly
          infoTitle = "NASA Subsonic Single Aft Engine (SUSAN) Aircraft";
          infoDescription = initialText;

          // If a part is currently selected, restore it
          if (currentSelection) {
            try { restorePartFromBaseline(currentSelection); } catch (e) { /* ignore */ }
            currentSelection = null;
          }
        }

        // Update DOM text
        const titleEl = document.getElementById('info-title');
        const descEl = document.getElementById('info-description');
        if (titleEl) titleEl.innerText = infoTitle;
        if (descEl) descEl.innerHTML = infoDescription;

        // Show graph if present
        if (graphImageFile) {
          const img = document.getElementById('graph-image');
          if (img) img.src = graphImageFile;
          if (graphContainer) graphContainer.style.display = 'block';
        }
      }

      // Expose bindButtonName for the radio buttons (no change)
      function bindButtonName(viewpointID) 
      {
        console.log(viewpointID);
        document.getElementById(viewpointID).bind = true;
      }

      // Show the intro on DOM ready
      document.addEventListener("DOMContentLoaded", function() {
        showDetail('initial');
      });
    </script>
</head>
