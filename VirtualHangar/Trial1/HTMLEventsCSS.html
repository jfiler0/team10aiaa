<!DOCTYPE html>
<html lang="en">
<head>
    <title>My first X3DOM page</title>
    <script type='text/javascript' src='http://www.x3dom.org/download/x3dom.js'> </script>
    <link rel='stylesheet' type='text/css' href='http://www.x3dom.org/download/x3dom.css'></link>
    <style>
        x3d
        {
            border:2px solid darkorange;
            background: rgba(128, 128, 128, 0.4);
        }
        body
        {
            font-size:110%;
            font-family:verdana, sans-serif;
            background-image: url('pattern.png');
            margin: 3em;
            color: lightgray;
        }

        h1
        {
            color: darkorange;
        }
    </style>
</head>
<body>
<h1>Hello, X3DOM!</h1>
<p>
    This is my first html page with some 3d objects.
</p>
<x3d width='600px' height='400px' showStat="true" PrimitiveQuality="high">
    <scene>
        <shape onmouseover="changeColor();" onmouseout="restoreColor();">
            <appearance>
                <material id="color" diffuseColor='1 0 0'></material>
            </appearance>
            <box></box>
        </shape>
        <transform translation='-3 0 0'>
            <shape>
                <appearance>
                    <ImageTexture  url="RandomScene.jpg"><ImageTexture/>
                </appearance>
                <cone></cone>
            </shape>
        </transform>
        <transform translation='3 0 0'>
            <shape>
                <appearance>
                    <ImageTexture  url="Pepe.png"><ImageTexture/>
                </appearance>
                <sphere></sphere>
            </shape>
        </transform>
    </scene>
</x3d>
<script>
    function changeColor()
    {
        document.getElementById("color").setAttribute('diffuseColor', '0 0 1');

    }
    function restoreColor()
    {
        document.getElementById("color").setAttribute('diffuseColor', '1 0 0');
    }
</script>
</body>
</html>
